<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Web-apper · Foreland</title>
<meta name="description" content="Små verktøy og eksperimenter du kan prøve." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--paper:#f3ede1;--ink:#20302f;--muted:#6c726a;--line:#d7cdb9;--accent:#2f7d72;--warm:#c0762f;--card:#faf6ee;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--paper);color:var(--ink);font-family:"Hanken Grotesk",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden;min-height:100vh;}
  .contours{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;}
  .wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:clamp(2.2rem,7vw,5rem) clamp(1.4rem,6vw,2.5rem) 4rem;}
  .back{display:inline-flex;align-items:center;gap:.5rem;font-size:.85rem;letter-spacing:.04em;color:var(--muted);text-decoration:none;margin-bottom:2.4rem;transition:color .2s,gap .2s;opacity:0;animation:rise .6s ease-out .05s forwards;}
  .back:hover{color:var(--accent);gap:.75rem;}
  .kicker{font-size:.78rem;letter-spacing:.32em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:1rem;opacity:0;animation:rise .7s ease-out .12s forwards;}
  h1{font-family:"Fraunces",serif;font-weight:500;font-size:clamp(2.8rem,11vw,4.5rem);line-height:.95;letter-spacing:-.02em;margin-bottom:1rem;opacity:0;animation:rise .8s ease-out .2s forwards;}
  .lede{font-size:clamp(1.02rem,2.4vw,1.18rem);color:var(--muted);max-width:42ch;margin-bottom:2.4rem;opacity:0;animation:rise .8s ease-out .3s forwards;}
  .grid{display:grid;gap:.9rem;}
  .card{display:flex;align-items:baseline;gap:1.1rem;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:1.35rem 1.5rem;text-decoration:none;color:var(--ink);transition:transform .25s,border-color .25s,box-shadow .25s;opacity:0;animation:rise .7s ease-out forwards;}
  .card:nth-child(1){animation-delay:.42s}.card:nth-child(2){animation-delay:.5s}.card:nth-child(3){animation-delay:.58s}.card:nth-child(4){animation-delay:.66s}.card:nth-child(5){animation-delay:.74s}.card:nth-child(6){animation-delay:.82s}
  .card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 12px 28px -16px rgba(32,48,47,.45);}
  .num{font-family:"Fraunces",serif;font-size:.95rem;color:var(--accent);font-variant-numeric:tabular-nums;padding-top:.15rem;}
  .card-body{flex:1;}
  .card-title{font-family:"Fraunces",serif;font-size:1.3rem;font-weight:500;line-height:1.2;}
  .card-desc{font-size:.92rem;color:var(--muted);margin-top:.2rem;}
  .arrow{font-size:1.1rem;color:var(--muted);transition:transform .25s,color .25s;align-self:center;}
  .card:hover .arrow{transform:translateX(4px);color:var(--accent);}
  footer{margin-top:4rem;padding-top:1.8rem;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:.6rem 1.4rem;justify-content:space-between;align-items:center;font-size:.85rem;color:var(--muted);opacity:0;animation:rise .8s ease-out .9s forwards;}
  footer a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--accent);}
  footer a:hover{color:var(--accent);}
  .coords{font-variant-numeric:tabular-nums;letter-spacing:.04em;}
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;}.back,.kicker,h1,.lede,.card,footer{opacity:1;}}
</style>
</head>
<body>
<svg class="contours" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <g fill="none" stroke="#c9bfa8" stroke-width="1.1">
    <path d="M-50 620 C 180 540, 420 700, 880 560" />
    <path d="M-50 670 C 180 600, 420 760, 880 620" />
    <path d="M-50 720 C 180 660, 420 820, 880 680" />
    <path d="M620 -40 C 700 160, 540 300, 760 460" />
    <path d="M680 -40 C 760 160, 600 300, 820 460" />
  </g>
</svg>

<div class="wrap">

    <a class="card" href="https://mortensebastian.github.io/diceandmonsters/index">

    <a class="card" href="#" target="_blank" rel="noopener">

  </div>

  <footer>
    <span>Skriv gjerne: <a href="mailto:hei@foreland.me">hei@foreland.me</a></span>
    <span class="coords">© <span id="year"></span> · Foreland</span>
  </footer>
</div>

<script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
